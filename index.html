<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Build a professional resume in minutes with our free online resume builder. Choose from multiple templates and export to PDF.">
    <title>Resume Builder — Create Your Professional Resume</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- ============ HEADER ============ -->
    <header class="app-header">
        <div class="header-left">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect x="2" y="4" width="18" height="22" rx="3" stroke="url(#g1)" stroke-width="2.2" />
                    <path d="M8 10h8M8 14h8M8 18h5" stroke="url(#g1)" stroke-width="1.8" stroke-linecap="round" />
                    <rect x="8" y="2" width="18" height="22" rx="3" fill="rgba(139,92,246,.15)" stroke="url(#g1)"
                        stroke-width="2.2" />
                    <path d="M14 8h8M14 12h8M14 16h5" stroke="url(#g1)" stroke-width="1.8" stroke-linecap="round" />
                    <defs>
                        <linearGradient id="g1" x1="0" y1="0" x2="28" y2="28">
                            <stop stop-color="#a78bfa" />
                            <stop offset="1" stop-color="#6d28d9" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>MyResumeBuilder</h1>
            </div>
        </div>
        <div class="header-right">
            <div class="template-selector">
                <label for="templateSelect">Template:</label>
                <select id="templateSelect">
                    <option value="classic">Classic</option>
                    <option value="modern" selected>Modern</option>
                    <option value="minimal">Minimal</option>
                    <option value="executive">Executive</option>
                    <option value="creative">Creative</option>
                    <option value="elegant">Elegant (Photo)</option>
                    <option value="compact">Compact</option>
                    <option value="bold">Bold</option>
                </select>
            </div>
            <button class="btn btn-toggle-theme" id="themeToggle" onclick="toggleTheme()"
                title="Toggle light/dark theme">
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                </svg>
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
            </button>
            <button class="btn btn-primary" id="downloadBtn" onclick="downloadPDF()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
                Download PDF
            </button>
        </div>
    </header>

    <!-- ============ MAIN LAYOUT ============ -->
    <main class="app-main">

        <!-- LEFT: FORM PANEL -->
        <section class="form-panel" id="formPanel">

            <!-- Step Indicator -->
            <div class="step-indicator">
                <button class="step-dot active" data-step="0"
                    onclick="goToStep(0)"><span>1</span><small>Personal</small></button>
                <div class="step-line"></div>
                <button class="step-dot" data-step="1"
                    onclick="goToStep(1)"><span>2</span><small>Education</small></button>
                <div class="step-line"></div>
                <button class="step-dot" data-step="2"
                    onclick="goToStep(2)"><span>3</span><small>Experience</small></button>
                <div class="step-line"></div>
                <button class="step-dot" data-step="3"
                    onclick="goToStep(3)"><span>4</span><small>Skills</small></button>
                <div class="step-line"></div>
                <button class="step-dot" data-step="4"
                    onclick="goToStep(4)"><span>5</span><small>Projects</small></button>
            </div>

            <!-- ===== STEP 0 — Personal Info ===== -->
            <div class="form-step active" data-step="0">
                <h2 class="section-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    Personal Information
                </h2>
                <!-- Photo Upload -->
                <div class="photo-upload-area">
                    <div class="photo-preview" id="photoPreview">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <div class="photo-upload-info">
                        <label class="btn btn-photo" for="photoInput">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                <polyline points="17 8 12 3 7 8" />
                                <line x1="12" y1="3" x2="12" y2="15" />
                            </svg>
                            Upload Photo
                        </label>
                        <input type="file" id="photoInput" accept="image/*" hidden>
                        <small>Used in the Elegant template</small>
                    </div>
                </div>
                <h2 class="section-title" style="display:none;">
                </h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="jobTitle">Job Title</label>
                        <input type="text" id="jobTitle" placeholder="Software Engineer">
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 890">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" placeholder="New York, NY">
                    </div>
                    <div class="form-group">
                        <label for="website">Website / LinkedIn</label>
                        <input type="url" id="website" placeholder="https://linkedin.com/in/johndoe">
                    </div>
                    <div class="form-group full-width">
                        <label for="summary">Professional Summary</label>
                        <textarea id="summary" rows="4"
                            placeholder="A brief summary of your professional background and career goals…"></textarea>
                    </div>
                </div>
            </div>

            <!-- ===== STEP 1 — Education ===== -->
            <div class="form-step" data-step="1">
                <h2 class="section-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                        <path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5" />
                    </svg>
                    Education
                </h2>
                <div id="educationEntries">
                    <!-- Dynamic entries injected here -->
                </div>
                <button class="btn btn-add" onclick="addEducation()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Add Education
                </button>
            </div>

            <!-- ===== STEP 2 — Experience ===== -->
            <div class="form-step" data-step="2">
                <h2 class="section-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2" />
                        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
                    </svg>
                    Work Experience
                </h2>
                <div id="experienceEntries">
                    <!-- Dynamic entries injected here -->
                </div>
                <button class="btn btn-add" onclick="addExperience()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Add Experience
                </button>
            </div>

            <!-- ===== STEP 3 — Skills ===== -->
            <div class="form-step" data-step="3">
                <h2 class="section-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    Skills
                </h2>
                <div class="form-group">
                    <label for="skillInput">Add skills (press Enter or comma)</label>
                    <div class="skill-input-wrapper">
                        <div class="skill-tags" id="skillTags"></div>
                        <input type="text" id="skillInput" placeholder="e.g. JavaScript, React, Node.js…">
                    </div>
                </div>
            </div>

            <!-- ===== STEP 4 — Projects ===== -->
            <div class="form-step" data-step="4">
                <h2 class="section-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                    </svg>
                    Projects
                </h2>
                <div id="projectEntries">
                    <!-- Dynamic entries injected here -->
                </div>
                <button class="btn btn-add" onclick="addProject()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Add Project
                </button>
            </div>

            <!-- Navigation Buttons -->
            <div class="form-nav">
                <button class="btn btn-back" id="backBtn" onclick="prevStep()" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                    Back
                </button>
                <button class="btn btn-next" id="nextBtn" onclick="nextStep()">
                    Next
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- RIGHT: LIVE PREVIEW -->
        <section class="preview-panel" id="previewPanel">
            <div class="preview-label">Live Preview</div>
            <div class="resume-preview" id="resumePreview">
                <!-- Resume content rendered here -->
                <div class="resume-empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                        stroke-linecap="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <p>Start filling the form to see<br>your resume come to life!</p>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
